<div class="container">

        <span>Bestand</span>
        <span>Bewerken</span>
        <span>Weergave</span>
        <span>Instellingen</span>
        <span>Help</span>

</div>

<mat-menu #menu="matMenu">

        <app-menu-button [label]="'Nieuw'" [icon]="'pencil'" [action]="'nieuw'" [shortKey]="'Ctrl + N'" (onAction)="handleAction($event)" [tooltip]="''"></app-menu-button>
        <app-menu-button [label]="'Open'" [icon]="'folder-open'" [action]="'open'" (onAction)="handleAction($event)" [tooltip]="''"></app-menu-button>
    </div>
</mat-menu>
