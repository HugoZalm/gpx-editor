<h2 mat-dialog-title>
  {{ 'dialog.import' | translate | titlecase }}
</h2>

<mat-dialog-content>
  @if (error()) {
    <div class="alert alert-error">{{ error() | translate | titlecase }}</div>
  }

  @if (success()) {
    <div class="alert alert-success">{{ success() | translate | titlecase }}</div>
  }

  @if (form !== undefined) {
    <label>{{ 'dialog.importinfo' | translate | titlecase }}</label>
    <hz-form-file-input 
      [multiple]="false"
      accept="extentions()"
      [formField]="form.files"
    ></hz-form-file-input>
  }
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton (click)="cancel()">{{ 'dialog.cancel' | translate | titlecase }}</button>
  <button matButton (click)="save()">{{ 'dialog.save' | translate | titlecase }}</button>
</mat-dialog-actions>
