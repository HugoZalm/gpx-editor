<h2 mat-dialog-title>
  {{ 'gpx' | translate | titlecase }}
</h2>

<mat-dialog-content>
  <pre>
    <code [highlight]="gpx()" language="xml"></code>
  </pre>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton (click)="cancel()">{{ 'dialog.cancel' | translate | titlecase }}</button>
</mat-dialog-actions>
