<h2 mat-dialog-title>
  {{ title() | translate | titlecase }}
</h2>

<mat-dialog-content>
<mat-form-field>
  <select matNativeControl (change)="select($event)">
    <option value=""></option>
    @for (option of list(); track option) {
      <option [value]="option.value"
            [selected]="selected === option.value">{{ option.label }}</option>
    }
  </select>
</mat-form-field>

<mat-dialog-actions>
  <button matButton (click)="cancel()">{{ 'dialog.cancel' | translate | titlecase }}</button>
  <button matButton (click)="ok()">{{ 'dialog.select' | translate | titlecase }}</button>
</mat-dialog-actions>
